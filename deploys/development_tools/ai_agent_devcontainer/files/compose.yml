services:
  devcontainer:
    privileged: true
    build: .
    working_dir: ${WORKING_DIR:-/workspaces}
    volumes:
      - type: bind
        source: ${WORKSPACE_DIR}
        target: /workspaces/${WORKSPACE_BASENAME}
        consistency: cached
      - type: bind
        source: ${GIT_WORKTREE_SOURCE:-/tmp/noworktree}/.git
        target: ${GIT_WORKTREE_TARGET:-/tmp/noworktree}/.git
        consistency: cached
      - type: bind
        source: ${HOME}/${PROVISION_MACHINES_DIR:-projects/provision-machines}/deploys/development_tools/ai_agent_devcontainer/files/opencode
        target: /home/codespace/.config/opencode
        consistency: cached
      - type: bind
        source: ${HOME}/${PROVISION_MACHINES_DIR:-projects/provision-machines}/deploys/development_tools/ai_agent_devcontainer/files/claude
        target: /home/codespace/.claude
        consistency: cached
      - type: bind
        source: ${HOME}/${PROVISION_MACHINES_DIR:-projects/provision-machines}/deploys/development_tools/ai_agent_devcontainer/files/gemini
        target: /home/codespace/.gemini
        consistency: cached
      - type: bind
        source: ${HOME}/${PROVISION_MACHINES_DIR:-projects/provision-machines}/deploys/development_tools/ai_agent_devcontainer/files/codex
        target: /home/codespace/.codex
        consistency: cached
      - type: volume
        source: docker-data
        target: /var/lib/docker
    user: codespace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OPENCODE_PORT=${OPENCODE_PORT:-4096}
      - GIT_AUTHOR_NAME
      - GIT_AUTHOR_EMAIL
      - GEMINI_API_KEY
      - GOOGLE_GEMINI_BASE_URL
      - OPENAI_API_KEY
    ports:
      - "127.0.0.1:${OPENCODE_PORT:-4096}:4096"

volumes:
  docker-data:
