services:
  devcontainer:
    privileged: true
    build: .
    working_dir: ${WORKING_DIR:-/workspaces}
    volumes:
      - type: bind
        source: ${WORKSPACE_DIR}
        target: /workspaces/${WORKSPACE_BASENAME}
        consistency: cached
      - type: bind
        source: ${GIT_WORKTREE_SOURCE:-/tmp/noworktree}
        target: ${GIT_WORKTREE_TARGET:-/tmp/noworktree}
        consistency: cached
      - type: bind
        source: ${HOME}/${PROVISION_MACHINES_DIR:-projects/provision-machines}/roles/ai_agent_devcontainer/files/opencode
        target: /home/codespace/.config/opencode
        consistency: cached
    user: codespace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OPENCODE_PORT=${OPENCODE_PORT:-4096}
    ports:
      - "127.0.0.1:${OPENCODE_PORT:-4096}:4096"
