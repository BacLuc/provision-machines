name: "Run provisioning on ubuntu"
"on":
  push:
  pull_request:
  schedule:
    - cron: "42 4 * * 0"
  workflow_dispatch:

jobs:
  pyinfra_lint:
    name: "pyinfra lint"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: "install dependencies"
        run: uv sync --frozen --all-extras

      - name: "pytest"
        run: uv run pytest

      - name: "ruff check"
        run: uv run ruff check .

      - name: "mypy"
        run: uv run mypy .

      - name: "isort"
        run: uv run isort --check .

      - name: "run prettier"
        run: |
          # renovate: datasource=docker depName=ghcr.io/bacluc/prettier-image/prettier-image
          prettier_image_version="3.8.1"
          docker run --rm -v $PWD:/workdir -w /workdir -u $UID ghcr.io/bacluc/prettier-image/prettier-image:${prettier_image_version}
          git diff --exit-code

  run_pyinfra:
    name: "Run pyinfra on ubuntu"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: "install dependencies"
        run: uv sync --frozen

      - name: "run pyinfra"
        run: uv run scripts/run_pyinfra_local.py

      - name: "run update-script"
        run: sudo update-script

      - name: "run cleanup-script"
        run: sudo cleanup-script

      - name: "run pyinfra a second time"
        run: uv run scripts/run_pyinfra_local.py
